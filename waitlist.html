<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Waitlist — Revveal</title>

  <link rel="stylesheet" href="./waitlist.css">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet" />
</head>

<body>

  <nav>
    <a href="/" class="logo">Revveal</a>
    <a href="/" class="back">← Back to home</a>
  </nav>

  <main>
    <div class="card">

      <h1>Join the waitlist</h1>
      <p>Be the first to access Revveal when we launch.</p>

      <form action="/thank-you.html" method="GET">
        <label>Email address</label>
        <input type="email" name="email" placeholder="you@company.com" required />

        <button type="submit">Join waitlist</button>
      </form>

      <div class="hint">
        No spam. Only product updates.
      </div>

    </div>
  </main>

</body>
</html>
